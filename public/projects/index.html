<script type="text/javascript">
    async function typewriter(text, elementId, waitAfter) {
        var n = 0,
            isTag = false
        addText = "";
        const el = document.getElementById(elementId);

        const wait = () => new Promise(r => setTimeout(r, waitAfter));
        const nowait = () => new Promise(r => r());

        const render = () => el.innerHTML = (text.slice(0, n + 1) + addText);

        const cursor = document.createElement('span');
        cursor.id = "blink";

        el.style.setProperty("--cursor-visibility", "visible");
        while (n < text.length) {
            if (text.charAt(n + 1) === "<") isTag = true;
            if (text.charAt(n + 1) === ">") isTag = false;

            if (isTag) {
                n++;
                continue;
            }

            requestAnimationFrame(render);

            if (waitAfter === 0) {
                await nowait();
            } else {
                await wait();
            }

            n++;
        }
        el.style.setProperty("--cursor-visibility", "collapse");
    }

    function parseDelay(d) {
        const parsed = parseInt(d, 10);
        if (isNaN(parsed)) return 0;
        return parsed;
    }

    const titleDelay = parseDelay("0"),
        contentDelay = parseDelay("0");
    const typeeffetct = async () => {
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003e\u003c\/h1\u003e\u003c\/span\u003e", "activity-title", titleDelay);
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch2 id=\u0022projects\u0022\u003eProjects\u003c\/h2\u003e\n\u003chr\u003e\n\u003ch3 id=\u0022industrial-project---googles-firebase--fall-2022\u0022\u003eIndustrial Project - Google\u0026rsquo;s Firebase | Fall 2022\u003c\/h3\u003e\n\u003cp\u003e\u003cem\u003eTypescript, HTML\u003c\/em\u003e\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eWorked on updating Firebase Web, ensuring tree shakability to speed up loading times.\u003c\/li\u003e\n\u003cli\u003eWorked alongside Google employees to plan out and begin the process of updating Firebase Web.\u003c\/li\u003e\n\u003cli\u003eExperienced professional work environments and navigating unexpected delays and changes.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch3 id=\u0022network-traffic-visualization--fall-2022\u0022\u003eNetwork Traffic Visualization | Fall 2022\u003c\/h3\u003e\n\u003cp\u003e\u003cem\u003eReact, HTML, CSS, Typescript, Python\u003c\/em\u003e\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eWorked on backend functionality for network traffic parsing and geolocation data gathering.\u003c\/li\u003e\n\u003cli\u003eIncreased efficiency of visualization by analyzing network traffic and browser rendering to find and fix bottlenecks.\u003c\/li\u003e\n\u003cli\u003eEnsured smooth communication between server and client browser by using modern network practices.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch3 id=\u0022cssa-game-jam---keyboard-warrior--winter-2022\u0022\u003eCSSA Game Jam - Keyboard Warrior | Winter 2022\u003c\/h3\u003e\n\u003cp\u003e\u003cem\u003eC#, Unity\u003c\/em\u003e\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eKey player in developing a 2D platformer from scratch for University Game Jam.\u003c\/li\u003e\n\u003cli\u003eWorked on game logic and gameplay elements in C#.\u003c\/li\u003e\n\u003cli\u003eUsed git with the Github flow model to remain organised.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch3 id=\u0022chefsnotes---recipe-manager-app--winter-2022\u0022\u003eChefsNotes - Recipe Manager App | Winter 2022\u003c\/h3\u003e\n\u003cp\u003e\u003cem\u003eAndroid Studio, Java, HSQLDB\u003c\/em\u003e\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eWorking in a team of 5, developed a recipe manager and database app in Java and HSQLDB.\u003c\/li\u003e\n\u003cli\u003eFocused on logic layer, developing communication and data transfer between UI and database.\u003c\/li\u003e\n\u003cli\u003eUsing GitLab to remain organised, we met our goals by the strict deadlines set by the professor.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch3 id=\u0022mindfully-wellness-tracker--fall-2021\u0022\u003eMindful.ly Wellness Tracker | Fall 2021\u003c\/h3\u003e\n\u003cp\u003e\u003cem\u003eHTML, CSS, Javascript\u003c\/em\u003e\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eHeld a key role in developing a web application using modern software and practices with a user-centric development process.\u003c\/li\u003e\n\u003cli\u003eUsed and modified Bootstrap SASS to create uniform styling across the application.\u003c\/li\u003e\n\u003cli\u003eWorked on UI elements during the user data collection feature using a mixture of HTML and Javascript, following user-centric design principles to ensure a smooth user experience.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003c\/span\u003e", "activity-content", contentDelay);
        return;
    }

    typeeffetct()
</script>
