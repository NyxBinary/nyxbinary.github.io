<script type="text/javascript">
    async function typewriter(text, elementId, waitAfter) {
        var n = 0,
            isTag = false
        addText = "";
        const el = document.getElementById(elementId);

        const wait = () => new Promise(r => setTimeout(r, waitAfter));
        const nowait = () => new Promise(r => r());

        const render = () => el.innerHTML = (text.slice(0, n + 1) + addText);

        const cursor = document.createElement('span');
        cursor.id = "blink";

        el.style.setProperty("--cursor-visibility", "visible");
        while (n < text.length) {
            if (text.charAt(n + 1) === "<") isTag = true;
            if (text.charAt(n + 1) === ">") isTag = false;

            if (isTag) {
                n++;
                continue;
            }

            requestAnimationFrame(render);

            if (waitAfter === 0) {
                await nowait();
            } else {
                await wait();
            }

            n++;
        }
        el.style.setProperty("--cursor-visibility", "collapse");
    }

    function parseDelay(d) {
        const parsed = parseInt(d, 10);
        if (isNaN(parsed)) return 0;
        return parsed;
    }

    const titleDelay = parseDelay("0"),
        contentDelay = parseDelay("0");
    const typeeffetct = async () => {
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003e\u003c\/h1\u003e\u003c\/span\u003e", "activity-title", titleDelay);
        await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch2 id=\u0022work-experience\u0022\u003eWork Experience\u003c\/h2\u003e\n\u003chr\u003e\n\u003ch3 id=\u0022the-real-escape-winnipeg-mb---sept-2021---present\u0022\u003eThe Real Escape, Winnipeg MB |  Sept 2021 - Present\u003c\/h3\u003e\n\u003cp\u003e\u003cem\u003eFacilitator\u003c\/em\u003e\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eEngaged with clients before, during, and after their experience to ensure a positive and memorable visit.\u003c\/li\u003e\n\u003cli\u003eSynergised with coworkers to ensure smooth operation of the facility and high quality experiences for clients.\u003c\/li\u003e\n\u003cli\u003eOperated the software used to run the rooms, learned and understood the unique process for each room.\u003c\/li\u003e\n\u003cli\u003eConducted minor repairs to malfunctioning rooms, allowing for continued operation.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch3 id=\u0022prairies-to-woodlands-remote--sept-2022---feb-2023\u0022\u003ePrairies to Woodlands, Remote | Sept 2022 - Feb 2023\u003c\/h3\u003e\n\u003cp\u003e\u003cem\u003eDeveloper\u003c\/em\u003e\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eWorked with indigenous elders to create an audio based dictionary for the Michif Language.\u003c\/li\u003e\n\u003cli\u003eWorked on parsing ELAN audio recordings, automatically categorizing and sorting audio snippets with custom made software.\u003c\/li\u003e\n\u003cli\u003eParsed and created custom data format for dictionary using Python and JSON.\u003c\/li\u003e\n\u003cli\u003eMigrated server host, moving existing website and software onto new server and ensuring continued functionality.\u003c\/li\u003e\n\u003cli\u003eWorked with elders and project manager to design and create a functional custom website.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch3 id=\u0022home-hardware-selkirk-mb--apr-2015---mar-2021\u0022\u003eHome Hardware, Selkirk MB | Apr 2015 - Mar 2021\u003c\/h3\u003e\n\u003cp\u003e\u003cem\u003eCustomer Service\/Paint Sales\u003c\/em\u003e\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eProvided customer service to 100\u002b clients on a daily basis by assisting with product returns and operating a point of sales system to keep client information up to date and process transactions.\u003c\/li\u003e\n\u003cli\u003eMaintained open communication with coworkers to promote smooth operation and consistency.\u003c\/li\u003e\n\u003cli\u003eDeveloped strong rapport with regulat clients by engaging in friendly conversation and providing personalised requests to meet their project needs.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003c\/span\u003e", "activity-content", contentDelay);
        return;
    }

    typeeffetct()
</script>
